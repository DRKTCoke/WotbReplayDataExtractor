# 在线版: 两个容器 (前端 nginx+Vue / 后端 Spring Boot API)
# 用法: cd java/online && docker compose up --build
#   - backend 上下文为仓库根 (编译时需要 common/tankopedia.json 与 java/)
#   - frontend 上下文为 java/ (需要 frontend/ 与 online/nginx.conf)
services:
  backend:
    build:
      context: ../..
      dockerfile: java/online/backend.Dockerfile
    container_name: wotb-backend
    ports:
      - "8087:8087"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: online/frontend.Dockerfile
    container_name: wotb-frontend
    ports:
      - "8088:80"
    depends_on:
      - backend
    restart: unless-stopped
